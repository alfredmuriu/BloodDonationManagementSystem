{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
    <h1>Book Appointment</h1>
    <p class="muted">Choose a hospital and a date to donate.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary btn-block">Book</button>
    </form>
    <p style="margin-top:14px;"><a href="{% url 'dashboard' %}">Back to dashboard</a></p>
</div>
{% endblock %}
