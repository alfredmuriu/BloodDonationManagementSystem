{% extends 'base.html' %}

{% block content %}
<style>
    .admin-shell {
        display: grid;
        grid-template-columns: 190px 1fr;
        gap: 40px;
        align-items: start;
    }

    /* Sidebar — plain light list */
    .admin-side {
        position: sticky;
        top: 90px;
    }
    .admin-side .side-title {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        font-weight: 600;
        padding: 0 10px 10px;
    }
    .admin-side a {
        display: block;
        color: #444;
        text-decoration: none;
        font-size: 14px;
        padding: 7px 10px;
        border-radius: 6px;
        margin-bottom: 1px;
    }
    .admin-side a:hover { background: #f4f5f6; color: var(--ink); }
    .admin-side a.active { color: var(--red); font-weight: 600; background: #fbeef0; }
    .admin-side .dot { display: none; }

    /* Content header */
    .admin-head {
        display: flex; align-items: flex-end; justify-content: space-between;
        gap: 16px; margin-bottom: 22px;
        padding-bottom: 16px; border-bottom: 1px solid var(--line);
    }
    .admin-head h1 { font-size: 22px; margin: 0; letter-spacing: -0.01em; }
    .admin-head .sub { color: var(--muted); font-size: 13.5px; margin: 4px 0 0; }
    .admin-head .crumb { color: var(--muted); font-size: 13px; margin: 0 0 5px; }
    .admin-head .crumb a { color: var(--muted); text-decoration: none; }
    .admin-head .crumb a:hover { color: var(--ink); }

    /* Data tables */
    .table-wrap {
        border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: #fff;
    }
    table.data { width: 100%; border-collapse: collapse; font-size: 14px; }
    table.data th {
        text-align: left; background: #f7f8fa; color: #5a616d;
        font-size: 11.5px; letter-spacing: 0.05em; text-transform: uppercase;
        padding: 12px 16px; border-bottom: 1px solid var(--line);
    }
    table.data td { padding: 13px 16px; border-bottom: 1px solid #f0f1f4; }
    table.data tr:last-child td { border-bottom: 0; }
    table.data tbody tr:hover td { background: #fafbfc; }
    .row-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 7px; }
    .btn-danger { color: var(--red); border-color: #eccdd2; }
    .btn-danger:hover { background: #fbeef0; }

    .empty {
        text-align: center; color: var(--muted); padding: 44px 20px; font-size: 14px;
    }

    /* Forms in the panel */
    .panel { background:#fff; border:1px solid var(--line); border-radius:12px; padding:26px; max-width:620px; }
    .panel form p { margin: 0 0 16px; }
    .panel label { font-weight: 600; font-size: 13px; }
    .panel .helptext { display:block; color:var(--muted); font-size:12px; font-weight:400; margin-top:4px; }
    .panel .errorlist { margin-top: 4px; }

    @media (max-width: 820px) {
        .admin-shell { grid-template-columns: 1fr; }
        .admin-side { position: static; }
    }
</style>

<div class="admin-shell">
    <aside class="admin-side">
        <div class="side-title">Control Panel</div>
        <a href="{% url 'dashboard' %}" class="{% if not slug %}active{% endif %}">
            <span class="dot"></span> Overview
        </a>
        {% for item in nav %}
        <a href="{% url 'manage_list' item.slug %}" class="{% if item.active %}active{% endif %}">
            <span class="dot"></span> {{ item.label }}
        </a>
        {% endfor %}
    </aside>

    <section class="admin-main">
        {% block admin_content %}{% endblock %}
    </section>
</div>
{% endblock %}
