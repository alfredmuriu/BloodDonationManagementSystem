{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
    <h1>Add Blood Unit</h1>
    <p class="muted">Expiry date is set automatically to 42 days after collection.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary btn-block">Add Unit</button>
    </form>
    <p style="margin-top:14px;"><a href="{% url 'dashboard' %}">Back to dashboard</a></p>
</div>
{% endblock %}
