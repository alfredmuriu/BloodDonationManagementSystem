<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation Management System</title>
    <style>
        :root {
            --red: #9b1c2e;
            --ink: #232323;
            --muted: #767676;
            --line: #d6d6d6;
            --bg: #f2f2f0;
            --card: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            color: var(--ink);
            background: var(--bg);
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
        }

        a { color: var(--red); }

        /* Top bar */
        header.topbar {
            background: var(--red);
            border-bottom: 3px solid #6f1320;
        }

        .topbar-inner {
            max-width: 940px;
            margin: 0 auto;
            padding: 12px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand .drop {
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50% 50% 50% 0;
            transform: rotate(45deg);
            display: inline-block;
        }

        .topbar nav a {
            text-decoration: none;
            color: #fff;
            font-size: 13px;
            margin-left: 18px;
        }

        .topbar nav a:hover { text-decoration: underline; }

        /* Layout */
        main {
            max-width: 940px;
            margin: 26px auto;
            padding: 0 22px;
        }

        h1 { font-size: 22px; margin: 0 0 6px; }
        h2 { font-size: 17px; margin: 0 0 8px; }
        p { margin: 0 0 12px; }
        .muted { color: var(--muted); }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            padding: 24px;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            font: inherit;
            padding: 8px 16px;
            border: 1px solid var(--line);
            background: #f4f4f2;
            color: var(--ink);
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover { background: #eaeae7; }

        .btn-primary {
            background: var(--red);
            border-color: #6f1320;
            color: #fff;
        }

        .btn-primary:hover { background: #851826; }

        .btn-block { display: block; width: 100%; text-align: center; }

        /* Forms */
        label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 4px; }

        input[type="text"], input[type="password"], input[type="date"],
        input[type="email"], input[type="number"], select, textarea {
            width: 100%;
            font: inherit;
            padding: 7px 9px;
            border: 1px solid #aaaaaa;
            background: #fff;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #888888;
        }

        .field { margin-bottom: 14px; }
        form p { margin: 0 0 14px; }

        /* Metrics row */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0;
            margin: 20px 0;
            border: 1px solid var(--line);
        }

        .metric {
            padding: 16px;
            border-right: 1px solid var(--line);
        }

        .metric:last-child { border-right: 0; }

        .metric .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .metric .value { font-size: 20px; font-weight: 700; }

        /* Status banner */
        .banner {
            padding: 14px 16px;
            border: 1px solid;
        }
        .banner-ok { background: #eef6ef; border-color: #b9d3bb; color: #2c6b34; }
        .banner-bad { background: #f9ecec; border-color: #d8b3b3; color: #8a1f2b; }

        /* Messages */
        .alert {
            background: #fbf6e7;
            border: 1px solid #e0d29a;
            color: #6b5712;
            padding: 10px 13px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .errorlist { color: var(--red); font-size: 13px; margin: 5px 0 0; padding-left: 16px; }

        .row-between { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }

        footer {
            max-width: 980px;
            margin: 30px auto;
            padding: 0 24px;
            color: var(--muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <a class="brand" href="{% url 'dashboard' %}"><span class="drop"></span> Blood Donation System</a>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>
    </div>
</header>

<main>
    {% if messages %}
        {% for message in messages %}
            <div class="alert">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>

</body>
</html>
