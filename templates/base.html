<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --ink: #241413;
            --muted: #765f5b;
            --blood: #b91c1c;
            --blood-dark: #7f1111;
            --rose: #fff0ec;
            --cream: #fff8ef;
            --gold: #f6b443;
            --green: #15803d;
            --blue: #1d4ed8;
            --shadow: 0 24px 70px rgba(71, 18, 12, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: "Manrope", sans-serif;
            background:
                radial-gradient(circle at 12% 18%, rgba(185, 28, 28, 0.18), transparent 28%),
                radial-gradient(circle at 84% 8%, rgba(246, 180, 67, 0.2), transparent 24%),
                linear-gradient(135deg, #fff8ef 0%, #fff0ec 48%, #fdf2f2 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(127, 17, 17, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(127, 17, 17, 0.045) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 78%);
        }

        .navbar {
            background: rgba(127, 17, 17, 0.92);
            border-bottom: 1px solid rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(16px);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            letter-spacing: -0.02em;
        }

        .brand-mark {
            display: inline-grid;
            width: 2.35rem;
            height: 2.35rem;
            place-items: center;
            border-radius: 999px;
            color: #fff;
            background: linear-gradient(145deg, #ef4444, #7f1111);
            box-shadow: inset 0 -8px 18px rgba(0, 0, 0, 0.18);
            font-weight: 800;
        }

        .page-shell {
            position: relative;
            z-index: 1;
            padding-bottom: 4rem;
        }

        .glass-card,
        .feature-card,
        .dashboard-card,
        .auth-card {
            border: 1px solid rgba(127, 17, 17, 0.1);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .hero-card {
            position: relative;
            overflow: hidden;
            padding: clamp(2rem, 5vw, 4.75rem);
        }

        .hero-card::after {
            content: "";
            position: absolute;
            right: -5rem;
            bottom: -6rem;
            width: 18rem;
            height: 18rem;
            border-radius: 48% 52% 56% 44%;
            background: linear-gradient(145deg, rgba(185, 28, 28, 0.2), rgba(246, 180, 67, 0.22));
        }

        .display-title {
            font-family: "Playfair Display", serif;
            font-size: clamp(2.7rem, 7vw, 5.8rem);
            line-height: 0.93;
            letter-spacing: -0.055em;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.45rem 0.8rem;
            border: 1px solid rgba(185, 28, 28, 0.18);
            border-radius: 999px;
            color: var(--blood-dark);
            background: rgba(255, 240, 236, 0.78);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.09em;
            text-transform: uppercase;
        }

        .btn {
            border-radius: 999px;
            font-weight: 800;
        }

        .btn-blood {
            color: #fff;
            border: 0;
            background: linear-gradient(135deg, #dc2626, #7f1111);
            box-shadow: 0 16px 28px rgba(185, 28, 28, 0.24);
        }

        .btn-blood:hover {
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 20px 34px rgba(185, 28, 28, 0.3);
        }

        .btn-cream {
            color: var(--blood-dark);
            border: 1px solid rgba(127, 17, 17, 0.16);
            background: rgba(255, 248, 239, 0.92);
        }

        .btn-cream:hover {
            color: var(--blood-dark);
            border-color: rgba(127, 17, 17, 0.28);
            background: #fff;
        }

        .form-control,
        .form-select {
            min-height: 3rem;
            border: 1px solid rgba(127, 17, 17, 0.16);
            border-radius: 16px;
            background-color: rgba(255, 255, 255, 0.86);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: rgba(185, 28, 28, 0.55);
            box-shadow: 0 0 0 0.25rem rgba(185, 28, 28, 0.12);
        }

        .auth-card {
            max-width: 620px;
            padding: clamp(1.5rem, 4vw, 2.5rem);
        }

        .auth-card p {
            margin-bottom: 1rem;
        }

        .auth-card label {
            margin-bottom: 0.35rem;
            color: var(--muted);
            font-weight: 800;
        }

        .helptext,
        .auth-card ul {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .stat-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.8rem 1rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(127, 17, 17, 0.1);
            font-weight: 800;
        }

        .metric-card {
            min-height: 145px;
            padding: 1.35rem;
            border-radius: 24px;
            border: 1px solid rgba(127, 17, 17, 0.1);
            background: rgba(255, 255, 255, 0.64);
        }

        .metric-card strong {
            display: block;
            font-size: 1.8rem;
            line-height: 1;
        }

        .status-banner {
            border: 0;
            border-radius: 24px;
            padding: 1.35rem;
        }

        .status-success {
            color: #064e3b;
            background: linear-gradient(135deg, rgba(220, 252, 231, 0.96), rgba(187, 247, 208, 0.78));
        }

        .status-danger {
            color: #7f1111;
            background: linear-gradient(135deg, rgba(254, 226, 226, 0.96), rgba(254, 202, 202, 0.78));
        }

        .role-icon {
            display: grid;
            width: 4rem;
            height: 4rem;
            place-items: center;
            border-radius: 22px;
            color: #fff;
            background: linear-gradient(145deg, var(--blood), var(--blood-dark));
            font-size: 1.8rem;
            font-weight: 900;
            box-shadow: 0 18px 35px rgba(127, 17, 17, 0.2);
        }

        .fade-up {
            animation: fadeUp 0.65s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="{% url 'index' %}">
            <span class="brand-mark">B</span>
            <span>Blood Donation System</span>
        </a>

        <div class="d-flex gap-2">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline-light px-3">
                    Dashboard
                </a>
                <a href="{% url 'logout' %}" class="btn btn-sm btn-light px-3">
                    Logout
                </a>
            {% else %}
                <a href="{% url 'register' %}" class="btn btn-sm btn-outline-light px-3">
                    Register
                </a>
                <a href="{% url 'login' %}" class="btn btn-sm btn-light px-3">
                    Login
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container page-shell mt-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} rounded-4 shadow-sm">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</main>

</body>
</html>
